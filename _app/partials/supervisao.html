<style>
    .content {
        padding-left: 10px !important;
        padding-right: 10px !important;
    }
    
    .user-item h5,
    .user-item em {
        padding-left: 0px !important;
        margin-bottom: 0px !important;
        line-height: 15pt;
    }
    
    .user-item {
        margin-bottom: 5pt;
        border-bottom: solid 3px rgba(73, 155, 234, 0.62);
        min-height: 45pt;
    }
    
    .user-item .user-item-icon-3 {
        padding: 0 10px;
        width: auto;
        /* text-align: center; */
        /* line-height: 30px; */
        position: relative !important;
        top: 0px;
        /* right: 0px; */
        border-radius: 0px;
        margin-top: 0px;
        font-size: 11px;
        /*float: right;*/
    }
    
    .bg-blue-light {
        color: #fff !important;
        padding: 0 15pt;
        font-weight: 700 !important;
        font-size: 15pt !important;
    }
    
    .toggle i {
        font-size: 15pt !important;
        padding-right: 25pt !important;
    }
    
    .toggle i.rotate-toggle {
        color: #c0392b !important;
    }
    
    .accordion-toggle i {
        float: inherit;
    }
    
    #i-toggle {
        float: right;
    }
    
    .button i {
        padding-right: 0px;
    }

</style>
<div class="header-clear">
</div>
<div class="content-strip">
    <div class="strip-content">
        <h1>Supervisão</h1>
    </div>
    <div class="overlay"></div> <img src="images/pictures/Sobre.png" alt="img"> </div>
<div class="content">
    <!-- erro -->
    <div ng-show="error" class="static-notification bg-red-dark">
        <h6><i class="fa fa-times-circle static-notification-icon"></i>Ooops!</h6>
        <a class="static-notification-close" href="#"><i class="fa fa-times"></i></a>
        <p>
            {{ errormsg }}
        </p>
    </div>
    

    <!-- sucesso -->
    <div ng-show="sucesso" class="static-notification bg-green-dark">
        <h6><i class="fa fa-check static-notification-icon"></i>Tudo certo!</h6>
        <a class="static-notification-close" href="#"><i class="fa fa-times"></i></a>
        <p>
            {{sucessomsg}}
        </p>
    </div>
    

    <div ng-show="!PostosDeServicos"> <i class="fa fa-refresh fa-spin"></i> Carregando Postos de Serviços</div>
    <div ng-show="PostosDeServicos">
        <div class="toggle">
            <a href="#" class="toggle-title bg-blue-light scale-hover">PESQUISE <i class="fa fa-plus"></i></a>
            <div class="toggle-content"> <small>Nome do Posto de Serviço</small>
                <br>
                <input onfocus="if (this.value=='Procure aqui') this.value = ''" onblur="if (this.value=='') this.value = 'Procure aqui'" type="text" name="searchValue" value="Procure aqui" class="input-padrao" id="searchValue" ng-model="searchValue" ng-change="pesquisa()">
            </div>
        </div>
        <br>
        
        
        <div class="one-half-responsive" ng-repeat="posto in PostosDeServicos | filter:searchValue">
            <div class="user-item">
                <a ng-href="#!/supervisaocriar/{{posto.PostoDeServicoId}}/{{posto.PostoDeServicoNome}}">
                    <h5>
                        <span ng-bind-html="posto.PostoDeServicoNome | highlight:searchValue"></span>
                    </h5>
                    <em><span ng-bind-html="posto.PostoDeServicoEndereco | highlight:searchValue"></span><span ng-show="posto.PostoDeServicoNumero">, {{posto.PostoDeServicoNumero}}</span></em>
                </a>
            </div>
        </div>
    </div>


</div>
